<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#0e0e12"/>

  <!-- Top half — violet -->
  <clipPath id="ch-top">
    <rect x="2" y="2" width="28" height="14"/>
  </clipPath>
  <circle cx="16" cy="16" r="12" fill="#7038f8" clip-path="url(#ch-top)"/>

  <!-- Bottom half — teal -->
  <clipPath id="ch-bot">
    <rect x="2" y="16" width="28" height="14"/>
  </clipPath>
  <circle cx="16" cy="16" r="12" fill="#48d0b0" clip-path="url(#ch-bot)"/>

  <!-- Dividing line -->
  <line x1="4" y1="16" x2="28" y2="16" stroke="#0e0e12" stroke-width="2.5"/>

  <!-- Center button -->
  <circle cx="16" cy="16" r="3.5" fill="#0e0e12"/>
  <circle cx="16" cy="16" r="3.5" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.2"/>
</svg>
